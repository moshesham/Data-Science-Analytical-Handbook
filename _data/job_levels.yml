# =============================================================================
# Job Level / Role Level Definitions
# Each entry defines a target interview level with its associated learning plan,
# skill focus areas, and curated handbook page list.
# =============================================================================

- id: "e3"
  label: "E3 — Data Analyst"
  short_label: "E3"
  icon: "fas fa-seedling"
  color_class: "level-e3"
  badge_color: "#10B981"
  duration: "6–8 weeks"
  description: "Entry-level analytical role. Focus on clean SQL, descriptive statistics, data storytelling, and translating business questions into queries."
  target_audience: "Graduating students, career changers, analysts with <2 years experience targeting IC3/E3 roles at Meta, Google, or comparable companies."
  typical_rounds:
    - "SQL coding screen (30–45 min, medium SELECT/JOIN/GROUP BY)"
    - "Case study — define a metric, interpret a chart"
    - "Behavioral — tell me about a project you worked on"
  key_skills:
    sql:
      label: "SQL — Core Queries"
      topics:
        - "SELECT, WHERE, ORDER BY, LIMIT"
        - "GROUP BY + aggregate functions (COUNT, SUM, AVG, MAX, MIN)"
        - "INNER JOIN, LEFT JOIN across 2 tables"
        - "Subqueries for simple filtering"
        - "Basic date functions (DATE_DIFF, DATE_TRUNC)"
      challenge_bar: "🟢 Easy — Medium"
    python:
      label: "Python — Exploratory Analysis"
      topics:
        - "pandas: read_csv, head, describe, value_counts"
        - "DataFrame selection, filtering, sorting"
        - "groupby + aggregation"
        - "Basic matplotlib / seaborn charts"
        - "Handling missing values with fillna / dropna"
    statistics:
      label: "Statistics — Descriptive"
      topics:
        - "Mean, median, mode — when to use each"
        - "Variance and standard deviation"
        - "Distributions: normal, skewed, bimodal"
        - "Correlation vs causation"
        - "Percentiles and outlier detection"
    product_sense:
      label: "Product Sense — Fundamentals"
      topics:
        - "Defining a North Star metric for a simple product"
        - "Interpreting a drop in a metric (basic)"
        - "User funnel basics (awareness → activation → retention)"
  learning_plan:
    - phase: "Phase 1 — Foundations (Weeks 1–2)"
      focus: "Statistics and core SQL"
      daily_time: "1–1.5 hours/day"
      exercises:
        - "Work through Statistics & Probability module — focus on descriptive stats"
        - "Complete SQL Basics: SELECT, WHERE, GROUP BY, JOINs"
        - "Practice 3 Easy SQL problems on LeetCode or StrataScratch daily"
        - "Read the SQL Cheat Sheet; reproduce every example by hand"
    - phase: "Phase 2 — Analysis Skills (Weeks 3–4)"
      focus: "Python EDA and metric thinking"
      daily_time: "1.5–2 hours/day"
      exercises:
        - "Python module: pandas groupby, merge, pivot"
        - "Build a simple EDA notebook on a Kaggle dataset"
        - "Practice defining a North Star + 3 supporting metrics for a familiar app"
        - "Work through 2 beginner analytical execution case studies"
    - phase: "Phase 3 — Interview Simulation (Weeks 5–8)"
      focus: "Timed practice and behavioral prep"
      daily_time: "2 hours/day"
      exercises:
        - "Timed SQL: solve 2 Medium problems in <15 min each"
        - "Write and refine 5 STAR stories using the Behavioral Interview guide"
        - "Complete the Interview Day Checklist"
        - "Do 2 mock analytical case studies with a study partner"
  pages:
    - url: "/introduction/"
      label: "Introduction & Interview Overview"
    - url: "/foundational_knowledge/1/"
      label: "Statistics & Probability"
    - url: "/foundational_knowledge/2-SQL/"
      label: "SQL & Data Manipulation"
    - url: "/foundational_knowledge/3/"
      label: "Python for Data Analysis"
    - url: "/exercises/beginner/"
      label: "Beginner Exercises"
    - url: "/interview-preparation/technical-skills/"
      label: "Technical Skills Interview"
    - url: "/interview-preparation/analytical-execution/"
      label: "Analytical Execution"
    - url: "/interview-preparation/behavioral-interview/"
      label: "Behavioral Interview"
    - url: "/supplementary/sql-cheat-sheet/"
      label: "SQL Cheat Sheet"
    - url: "/supplementary/statistics-cheat-sheet/"
      label: "Statistics Cheat Sheet"
    - url: "/interview-preparation/interview-day-checklist/"
      label: "Interview Day Checklist"

